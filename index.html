<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דשבורד הכנה לבגרות בהיסטוריה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { overflow-x: hidden; max-width: 100vw; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 overflow-x-hidden">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react'
    import { createRoot } from 'react-dom/client'
    import { 
      BookOpen, CheckCircle, XCircle, ArrowLeft, ArrowRight, 
      Award, FileText, Sparkles, Loader2, MessageSquare, 
      LayoutDashboard, ChevronLeft, Folder, Bookmark
    } from 'lucide-react'

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYYG_UeQY4eaoDcXe7eaHdC71k9HPi-mgZF09s4Yl6MCsXIkqnJFkLX0UWE3ecWGg/exec"

    const DASHBOARD_STRUCTURE = {
      "השואה": {
        subcategories: {
          "מבוא ומושגי יסוד": [],
          "הגטאות": [],
          "הפתרון הסופי": []
        }
      },
      "סוגיות": {
        subcategories: {
          "תהליך הדה קולוניזציה וגורל היהודים בארצות האסלאם": [
            { id: "deco_q1", title: "שאלה 1" }
            { id: "deco_q2", title: "שאלה 2" }
          ],
          "העליות בשנות ה50 וה60": [],
          "מלחמת יום הכיפורים": []
        }
      }
    }

    const BagrutLomda = () => {
      const [allData, setAllData] = useState({ questions: [], texts: {} })
      const [isLoading, setIsLoading] = useState(true)
      const [fetchError, setFetchError] = useState(false)
      
      const [selectedCategory, setSelectedCategory] = useState(null)
      const [selectedSubcategory, setSelectedSubcategory] = useState(null)
      const [selectedTopic, setSelectedTopic] = useState(null)
      
      const [currentStep, setCurrentStep] = useState(0)
      const [selectedAnswers, setSelectedAnswers] = useState({})
      const [showExplanationMap, setShowExplanationMap] = useState({})
      const [wrongAnswersMap, setWrongAnswersMap] = useState({})
      const [showErrorMsgMap, setShowErrorMsgMap] = useState({})

      const [userEssay, setUserEssay] = useState('')
      const [isGrading, setIsGrading] = useState(false)
      const [aiFeedback, setAiFeedback] = useState('')
      const [aiScore, setAiScore] = useState(null)
      const [studentName, setStudentName] = useState('')
      const [studentClass, setStudentClass] = useState('')
      const [isSubmitted, setIsSubmitted] = useState(false)
      const [isSubmittingGrade, setIsSubmittingGrade] = useState(false)

      useEffect(() => {
        const fetchData = async () => {
          try {
            const response = await fetch(GOOGLE_SCRIPT_URL)
            if (!response.ok) throw new Error('Network error')
            const data = await response.json()
            setAllData(data)
            setIsLoading(false)
          } catch (error) {
            console.error("Error fetching data", error)
            setFetchError(true)
            setIsLoading(false)
          }
        }
        fetchData()
      }, [])

      const currentSteps = useMemo(() => {
        if (!selectedTopic) return []
        return allData.questions.filter(q => q.topic_id === selectedTopic)
      }, [allData, selectedTopic])

      const currentTexts = useMemo(() => {
        if (!selectedTopic) return []
        return allData.texts[selectedTopic] || []
      }, [allData, selectedTopic])

      const step = currentSteps[currentStep]
      const selectedAnswer = selectedAnswers[currentStep]
      const showExplanation = showExplanationMap[currentStep] || false
      const wrongAnswers = wrongAnswersMap[currentStep] || []
      const showErrorMsg = showErrorMsgMap[currentStep] || false

      const handleAnswerSelect = (index) => {
        if (showExplanation) return
        
        if (step.require_multiple) {
          setShowErrorMsgMap(prev => ({ ...prev, [currentStep]: false }))
          let current = Array.isArray(selectedAnswer) ? selectedAnswer : []
          let next = current.includes(index) ? current.filter(i => i !== index) : [...current, index]
          setSelectedAnswers(prev => ({ ...prev, [currentStep]: next }))
          
          const correctOnes = Array.isArray(step.correct_answer) ? step.correct_answer : [step.correct_answer]
          if (next.length === correctOnes.length) {
            const allOk = next.every(val => correctOnes.includes(val))
            if (allOk) {
              setShowExplanationMap(prev => ({ ...prev, [currentStep]: true }))
            } else {
              setShowErrorMsgMap(prev => ({ ...prev, [currentStep]: true }))
            }
          }
        } else {
          if (index === step.correct_answer) {
            setSelectedAnswers(prev => ({ ...prev, [currentStep]: index }))
            setShowExplanationMap(prev => ({ ...prev, [currentStep]: true }))
          } else {
            setWrongAnswersMap(prev => ({ ...prev, [currentStep]: [...(prev[currentStep] || []), index] }))
          }
        }
      }

      const callGeminiAPI = async (prompt, systemInstruction) => {
        const apiKey = "AIzaSyCuF86NuNu_NFeWaapaWUaZ7S3CenQoOhU"
        const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] }
        }
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          })
          const data = await res.json()
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "לא התקבלה תגובה"
        } catch (e) { return "שגיאה בחיבור לשרת" }
      }

      const handleGradeEssay = async () => {
        if (!userEssay.trim()) return
        setIsGrading(true)
        const prompt = `השאלה: ${step.content} תשובת התלמיד: ${userEssay} הערך את התשובה ותן ציון מ-0 עד 100. התחל במילה ציון: X/100 ולאחר מכן משוב קצר ומעודד בעברית ללא נקודה פסיק וללא מקפים ארוכים.`
        const result = await callGeminiAPI(prompt, "אתה מורה מקצועי להיסטוריה שבודק בחינות בגרות.")
        setAiFeedback(result)
        const match = result.match(/ציון:\s*(\d+)/)
        if (match) setAiScore(parseInt(match[1], 10))
        setIsGrading(false)
      }

      const handleSubmitGrade = async () => {
        if (!studentName.trim()) return
        setIsSubmittingGrade(true)
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              topic_id: selectedTopic,
              studentName: studentName,
              studentClass: studentClass,
              score: aiScore,
              essay: userEssay,
              feedback: aiFeedback
            })
          })
          
          setIsSubmitted(true)
          setIsSubmittingGrade(false)
          
          setTimeout(() => {
            setSelectedTopic(null)
            setCurrentStep(0)
            setSelectedAnswers({})
            setShowExplanationMap({})
            setWrongAnswersMap({})
            setShowErrorMsgMap({})
            setUserEssay('')
            setAiFeedback('')
            setAiScore(null)
            setStudentName('')
            setStudentClass('')
            setIsSubmitted(false)
          }, 3000)

        } catch (e) {
          console.error(e)
          setIsSubmittingGrade(false)
        }
      }

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <Loader2 className="w-12 h-12 text-blue-600 animate-spin mb-4" />
            <p className="text-xl font-bold text-slate-700">טוען נתונים מהגיליון...</p>
          </div>
        )
      }

      if (fetchError) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
            <XCircle className="w-16 h-16 text-red-500 mb-4" />
            <h1 className="text-2xl font-bold text-slate-800">אופס תקלה בחיבור</h1>
            <p className="text-slate-600 mt-2">לא הצלחנו למשוך את השאלות מגוגל. וודא שהסקריפט מפורסם לכולם.</p>
          </div>
        )
      }

      if (!selectedCategory) {
        return (
          <div className="min-h-screen p-4 md:p-8 bg-slate-50 animate-fadeIn">
            <div className="max-w-4xl mx-auto">
              <header className="mb-10 text-center">
                <div className="inline-block p-3 bg-blue-100 rounded-2xl mb-4">
                  <LayoutDashboard className="w-8 h-8 text-blue-600" />
                </div>
                <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-2">דשבורד הכנה לבגרות</h1>
                <p className="text-slate-600">בחרו קטגוריה כדי להתחיל</p>
              </header>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {Object.keys(DASHBOARD_STRUCTURE).map(cat => (
                  <button 
                    key={cat}
                    onClick={() => setSelectedCategory(cat)}
                    className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 hover:shadow-md transition-all text-right group flex items-center justify-between"
                  >
                    <div className="flex items-center gap-4">
                      <div className="bg-blue-100 p-3 rounded-xl text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <BookOpen className="w-6 h-6" />
                      </div>
                      <h3 className="text-2xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors">{cat}</h3>
                    </div>
                    <ChevronLeft className="text-slate-300 group-hover:text-blue-500 transition-transform group-hover:-translate-x-1" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        )
      }

      if (!selectedSubcategory) {
        return (
          <div className="min-h-screen p-4 md:p-8 bg-slate-50 animate-fadeIn">
            <div className="max-w-4xl mx-auto">
              <button onClick={() => setSelectedCategory(null)} className="text-slate-500 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold transition-colors">
                <ArrowRight className="w-5 h-5" /> חזרה לקטגוריות
              </button>
              
              <h2 className="text-2xl font-bold text-slate-800 mb-6">{selectedCategory} רשימת נושאים</h2>
              
              <div className="grid grid-cols-1 gap-4">
                {Object.keys(DASHBOARD_STRUCTURE[selectedCategory].subcategories).map(sub => (
                  <button 
                    key={sub}
                    onClick={() => setSelectedSubcategory(sub)}
                    className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 transition-all text-right group flex items-center justify-between"
                  >
                    <div className="flex items-center gap-4">
                      <div className="bg-slate-100 p-2 rounded-lg text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                        <Folder className="w-5 h-5" />
                      </div>
                      <span className="text-lg font-bold text-slate-700 group-hover:text-blue-700 transition-colors">{sub}</span>
                    </div>
                    <ChevronLeft className="text-slate-300 group-hover:text-blue-500 transition-transform group-hover:-translate-x-1" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        )
      }

      if (!selectedTopic) {
        const questionsList = DASHBOARD_STRUCTURE[selectedCategory].subcategories[selectedSubcategory]
        return (
          <div className="min-h-screen p-4 md:p-8 bg-slate-50 animate-fadeIn">
            <div className="max-w-4xl mx-auto">
              <button onClick={() => setSelectedSubcategory(null)} className="text-slate-500 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold transition-colors">
                <ArrowRight className="w-5 h-5" /> חזרה לרשימת הנושאים
              </button>
              
              <h2 className="text-2xl font-bold text-slate-800 mb-2">{selectedSubcategory}</h2>
              <p className="text-slate-600 mb-6 font-medium">בחרו שאלת תרגול מתוך הרשימה למטה</p>
              
              <div className="grid grid-cols-1 gap-4">
                {questionsList.length === 0 ? (
                  <div className="bg-slate-100 p-8 rounded-2xl text-center border-2 border-dashed border-slate-300">
                    <p className="text-slate-500 font-bold text-lg">אין עדיין שאלות בחלק זה</p>
                    <p className="text-slate-400 text-sm mt-1">המורה יוסיף שאלות בקרוב</p>
                  </div>
                ) : (
                  questionsList.map(q => (
                    <button 
                      key={q.id}
                      onClick={() => setSelectedTopic(q.id)}
                      className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-500 transition-all text-right group flex items-center justify-between"
                    >
                      <div className="flex items-center gap-4">
                        <div className="bg-indigo-50 p-2 rounded-lg text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                          <Bookmark className="w-5 h-5" />
                        </div>
                        <span className="text-lg font-bold text-slate-700 group-hover:text-indigo-700 transition-colors">{q.title}</span>
                      </div>
                      <ChevronLeft className="text-slate-300 group-hover:text-indigo-500 transition-transform group-hover:-translate-x-1" />
                    </button>
                  ))
                )}
              </div>
            </div>
          </div>
        )
      }

      return (
        <div className="min-h-screen py-4 px-2 sm:px-4 animate-fadeIn">
          <div className="max-w-3xl mx-auto bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-100 relative">
            
            <div className="bg-blue-600 text-white p-4 md:p-6 flex items-center justify-between">
              <button onClick={() => setSelectedTopic(null)} className="p-2 hover:bg-blue-700 rounded-lg transition-colors">
                <ArrowRight className="w-6 h-6" />
              </button>
              <div className="text-center">
                <h1 className="text-lg md:text-xl font-bold leading-tight">{step?.title}</h1>
                <p className="text-blue-100 text-xs">{step?.subtitle}</p>
              </div>
              <div className="bg-blue-700 px-3 py-1 rounded-lg text-xs font-bold">
                {currentStep + 1} / {currentSteps.length}
              </div>
            </div>

            <div className="h-1.5 bg-slate-100 w-full">
              <div className="h-full bg-yellow-400 transition-all duration-500" style={{ width: `${((currentStep + 1) / currentSteps.length) * 100}%` }} />
            </div>

            <div className="p-4 md:p-8">
              {step?.step_type === 'intro' && (
                <div className="space-y-6 animate-fadeIn">
                  <div className="bg-blue-50 p-5 rounded-2xl text-blue-900 leading-relaxed">{step.content}</div>
                  <div className="bg-[#fdfbf7] p-6 rounded-2xl border border-amber-200 shadow-inner max-h-96 overflow-y-auto">
                    <div className="whitespace-pre-line leading-loose text-lg text-slate-800">
                      {currentTexts.map(t => <span key={t.id}>{t.text} </span>)}
                    </div>
                  </div>
                </div>
              )}

              {step?.step_type === 'text-selection' && (
                <div className="space-y-6 animate-fadeIn">
                  <div className="text-center space-y-2">
                    <h2 className="text-xl font-bold text-slate-800">{step.content}</h2>
                    <p className="text-blue-600 font-medium text-sm">
                      {step.require_multiple ? 'לחצו על כל המשפטים הרלוונטיים בטקסט' : 'לחצו על המשפט הרלוונטי בטקסט'}
                    </p>
                  </div>
                  <div className="bg-[#fdfbf7] p-6 rounded-2xl border border-amber-200 shadow-inner max-h-96 overflow-y-auto">
                    <div className="whitespace-pre-line leading-loose text-lg">
                      {currentTexts.map(t => {
                        const isSelected = Array.isArray(selectedAnswer) ? selectedAnswer.includes(t.id) : selectedAnswer === t.id
                        const correctOnes = Array.isArray(step.correct_answer) ? step.correct_answer : [step.correct_answer]
                        const isCorrectSegment = correctOnes.includes(t.id)

                        let spanClass = "cursor-pointer transition-colors px-1 rounded mx-0.5 "

                        if (showExplanation) {
                          if (isCorrectSegment) spanClass += "bg-green-200 font-bold text-green-900"
                          else spanClass += "text-slate-400"
                        } else {
                          if (step.require_multiple) {
                            if (isSelected) {
                              if (showErrorMsg) {
                                spanClass += isCorrectSegment ? "bg-green-200 font-bold text-green-900" : "bg-red-200 line-through text-red-900"
                              } else {
                                spanClass += "bg-blue-200 text-blue-900"
                              }
                            } else {
                              spanClass += "hover:bg-amber-100"
                            }
                          } else {
                            if (wrongAnswers.includes(t.id)) spanClass += "bg-red-200 line-through text-red-900"
                            else spanClass += "hover:bg-amber-100"
                          }
                        }

                        return (
                          <span 
                            key={t.id}
                            onClick={() => handleAnswerSelect(t.id)}
                            className={spanClass}
                          >
                            {t.text} 
                          </span>
                        )
                      })}
                    </div>
                  </div>
                  
                  {step.require_multiple && showErrorMsg && !showExplanation && (
                    <div className={`p-5 rounded-2xl flex gap-3 animate-fadeIn ${
                      (Array.isArray(selectedAnswer) && selectedAnswer.filter(id => (Array.isArray(step.correct_answer) ? step.correct_answer : [step.correct_answer]).includes(id)).length > 0)
                        ? 'bg-orange-100 text-orange-900' : 'bg-red-100 text-red-900'
                    }`}>
                      <XCircle className="shrink-0 mt-1" />
                      <div>
                        <p className="font-bold text-lg mb-1">
                          {(Array.isArray(selectedAnswer) && selectedAnswer.filter(id => (Array.isArray(step.correct_answer) ? step.correct_answer : [step.correct_answer]).includes(id)).length > 0)
                            ? 'חצי דרך לשם' : 'לא מדויק נסו שוב'}
                        </p>
                        <p>
                          {(Array.isArray(selectedAnswer) && selectedAnswer.filter(id => (Array.isArray(step.correct_answer) ? step.correct_answer : [step.correct_answer]).includes(id)).length > 0)
                            ? 'משפט אחד שסימנתם נכון והשארנו אותו בירוק. לחצו על המשפט האדום כדי לבטל אותו ונסו לחפש את המשפט המשלים.'
                            : 'המשפטים שסימנתם אינם נכונים. לחצו עליהם כדי לבטל את הסימון ונסו שוב.'}
                        </p>
                      </div>
                    </div>
                  )}

                  {!step.require_multiple && wrongAnswers.length > 0 && !showExplanation && (
                    <div className="bg-red-100 p-5 rounded-2xl text-red-900 flex gap-3 animate-fadeIn">
                      <XCircle className="shrink-0 mt-1" />
                      <div>
                        <p className="font-bold text-lg mb-1">לא מדויק כדאי לנסות שוב</p>
                        <p>המשפט שסימנתם אינו התשובה הנכונה. המשיכו לחפש בטקסט.</p>
                      </div>
                    </div>
                  )}

                  {showExplanation && (
                    <div className="bg-green-100 p-5 rounded-2xl text-green-900 flex gap-3 mt-4 animate-fadeIn">
                      <CheckCircle className="shrink-0 mt-1" />
                      <div>
                        <p className="font-bold text-lg mb-1">נכון מאוד</p>
                        <p>{step.explanation}</p>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {step?.step_type === 'question' && (
                <div className="space-y-4 animate-fadeIn">
                  <h2 className="text-xl font-bold text-slate-800 mb-6">{step.content}</h2>
                  <div className="grid gap-3">
                    {step.options.map((opt, idx) => (
                      <button 
                        key={idx}
                        onClick={() => handleAnswerSelect(idx)}
                        disabled={showExplanation}
                        className={`w-full text-right p-4 rounded-2xl border-2 transition-all ${
                          showExplanation && idx === step.correct_answer ? 'border-green-500 bg-green-50 text-green-900' :
                          wrongAnswers.includes(idx) ? 'border-red-200 opacity-50 cursor-not-allowed' : 'border-slate-200 hover:border-blue-400 hover:bg-blue-50'
                        }`}
                      >
                        {opt}
                      </button>
                    ))}
                  </div>
                  {showExplanation && (
                    <div className="bg-green-100 p-5 rounded-2xl text-green-900 flex gap-3 mt-4 animate-fadeIn">
                      <CheckCircle className="shrink-0 mt-1" />
                      <div>
                        <p className="font-bold text-lg mb-1">נכון מאוד</p>
                        <p>{step.explanation}</p>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {step?.step_type === 'ai-practice' && (
                <div className="space-y-6 animate-fadeIn">
                  <div className="bg-[#fdfbf7] p-5 rounded-2xl border border-amber-200 shadow-inner max-h-48 overflow-y-auto mb-4">
                    <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2 text-sm">
                      <FileText className="w-4 h-4" /> קטע המקור לתרגול
                    </h3>
                    <div className="whitespace-pre-line leading-relaxed text-slate-800 text-sm">
                      {currentTexts.map(t => <span key={t.id}>{t.text} </span>)}
                    </div>
                  </div>

                  <div className="bg-indigo-50 p-6 rounded-3xl border-2 border-indigo-100">
                    <div className="flex items-center gap-2 mb-3 text-indigo-900 font-bold">
                      <MessageSquare className="w-5 h-5" />
                      <span>משימת כתיבה</span>
                    </div>
                    <p className="text-lg text-slate-800 font-medium leading-relaxed">{step.content}</p>
                    <textarea 
                      value={userEssay}
                      onChange={(e) => setUserEssay(e.target.value)}
                      className="w-full h-44 p-5 mt-5 rounded-2xl border-none shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700"
                      placeholder="כתבו כאן את התשובה המפורטת שלכם..."
                    />
                    <button 
                      onClick={handleGradeEssay}
                      disabled={isGrading || !userEssay.trim()}
                      className="w-full mt-5 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-3"
                    >
                      {isGrading ? <Loader2 className="animate-spin" /> : <Sparkles />}
                      {isGrading ? 'המורה בודק את התשובה...' : 'שלח לבדיקת בינה מלאכותית'}
                    </button>
                  </div>

                  {aiFeedback && (
                    <div className="bg-white p-6 rounded-3xl border-2 border-green-200 shadow-sm animate-fadeIn">
                      <div className="flex items-center gap-2 mb-3 text-green-800 font-bold">
                        <Award className="w-6 h-6" />
                        <span>משוב המורה הווירטואלי</span>
                      </div>
                      <p className="whitespace-pre-line text-slate-700 text-lg leading-relaxed">{aiFeedback}</p>
                      
                      {aiScore !== null && aiScore >= 80 && !isSubmitted && (
                        <div className="mt-6 bg-green-50 p-5 rounded-2xl border border-green-200 animate-fadeIn">
                          <h4 className="font-bold text-green-900 flex items-center gap-2 mb-3">
                            <Award className="w-6 h-6" /> ציון מעולה כל הכבוד! הכניסו פרטים לשמירה
                          </h4>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                            <input 
                              type="text" 
                              placeholder="שם מלא" 
                              value={studentName} 
                              onChange={e => setStudentName(e.target.value)} 
                              className="p-3 rounded-xl border border-green-300 focus:ring-2 focus:ring-green-500 outline-none w-full"
                            />
                            <input 
                              type="text" 
                              placeholder="כיתה" 
                              value={studentClass} 
                              onChange={e => setStudentClass(e.target.value)} 
                              className="p-3 rounded-xl border border-green-300 focus:ring-2 focus:ring-green-500 outline-none w-full"
                            />
                          </div>
                          <button 
                            onClick={handleSubmitGrade} 
                            disabled={!studentName.trim() || isSubmittingGrade} 
                            className="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition-colors disabled:opacity-50"
                          >
                            {isSubmittingGrade ? 'שומר נתונים...' : 'שלח ציון למורה'}
                          </button>
                        </div>
                      )}

                      {isSubmitted && (
                        <div className="mt-6 bg-blue-50 p-5 rounded-2xl border border-blue-200 text-center animate-fadeIn text-blue-900 font-bold">
                          <CheckCircle className="w-10 h-10 mx-auto text-blue-500 mb-2" />
                          הציון נשמר בהצלחה! חוזר לדשבורד באופן אוטומטי...
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="bg-slate-50 p-5 md:p-6 border-t border-slate-100 flex items-center justify-between">
              <button 
                onClick={() => setCurrentStep(prev => prev - 1)} 
                disabled={currentStep === 0}
                className="flex items-center gap-2 px-4 py-2 text-slate-500 font-bold disabled:opacity-20 transition-opacity"
              >
                <ArrowRight className="w-5 h-5" /> חזור
              </button>
              {currentStep < currentSteps.length - 1 && (
                <button 
                  onClick={() => setCurrentStep(prev => prev + 1)} 
                  className="bg-blue-600 text-white font-bold px-10 py-3 rounded-2xl hover:bg-blue-700 transition-all shadow-md active:scale-95"
                >
                  המשך לשלב הבא
                </button>
              )}
            </div>
          </div>
        </div>
      )
    }

    const root = createRoot(document.getElementById('root'))
    root.render(<BagrutLomda />)
  </script>
</body>
</html>
