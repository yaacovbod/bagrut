<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דשבורד הכנה לבגרות בהיסטוריה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow-x: hidden;
      max-width: 100vw;
      font-family: 'Rubik', sans-serif;
      background: linear-gradient(rgba(255, 255, 255, 0.50), rgba(255, 255, 255, 0.50)),
                  url('./backround.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
    
    #root > div {
      background-color: transparent !important;
    }
    
    .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react'
    import { createRoot } from 'react-dom/client'
    import { 
      BookOpen, CheckCircle, XCircle, ArrowLeft, ArrowRight, 
      Award, FileText, Sparkles, Loader2, MessageSquare, 
      LayoutDashboard, ChevronLeft, Folder, Bookmark, Lock, RotateCcw
    } from 'lucide-react'

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYYG_UeQY4eaoDcXe7eaHdC71k9HPi-mgZF09s4Yl6MCsXIkqnJFkLX0UWE3ecWGg/exec"


    // פונקציית עזר לאיפוס מצב שאלה - תיקון באג: כפתור חזור לא איפס את כל ה-state
    const resetQuestionState = (setters) => {
      setters.setSelectedTopic(null)
      setters.setCurrentStep(0)
      setters.setSelectedAnswers({})
      setters.setShowExplanationMap({})
      setters.setWrongAnswersMap({})
      setters.setShowErrorMsgMap({})
    }

    const BagrutLomda = () => {
      const [allData, setAllData] = useState({ questions: [], texts: {} })
      const [isLoading, setIsLoading] = useState(true)
      
      const [sitePassword, setSitePassword] = useState(null)
      const [isAuthenticated, setIsAuthenticated] = useState(false)
      const [passwordInput, setPasswordInput] = useState('')
      const [passwordError, setPasswordError] = useState(false)

      const [selectedCategory, setSelectedCategory] = useState(null)
      const [selectedSubcategory, setSelectedSubcategory] = useState(null)
      const [selectedTopic, setSelectedTopic] = useState(null)
      
      const [currentStep, setCurrentStep] = useState(0)
      const [selectedAnswers, setSelectedAnswers] = useState({})
      const [showExplanationMap, setShowExplanationMap] = useState({})
      const [wrongAnswersMap, setWrongAnswersMap] = useState({})
      const [showErrorMsgMap, setShowErrorMsgMap] = useState({})

      const [userEssay, setUserEssay] = useState('')
      const [isGrading, setIsGrading] = useState(false)
      const [aiFeedback, setAiFeedback] = useState('')
      const [aiScore, setAiScore] = useState(null)
      const [studentName, setStudentName] = useState('')
      const [studentClass, setStudentClass] = useState('')
      const [isSubmitted, setIsSubmitted] = useState(false)
      const [isSubmittingGrade, setIsSubmittingGrade] = useState(false)

      useEffect(() => {
        const fetchData = async () => {
          try {
            const response = await fetch(GOOGLE_SCRIPT_URL)
            const data = await response.json()
            setAllData(data)

            if (data.accessKey) {
              setSitePassword(data.accessKey.toString())
              const savedPass = localStorage.getItem('bagrut_site_password')
              if (savedPass && savedPass === data.accessKey.toString()) {
                setIsAuthenticated(true)
              }
            } else {
              setIsAuthenticated(true)
            }
            
            setIsLoading(false)
          } catch (error) {
            console.error("שגיאה בטעינת נתונים", error)
            setIsLoading(false)
          }
        }
        fetchData()
      }, [])

      const dashboardStructure = useMemo(() => {
        if (!Array.isArray(allData.questions) || !allData.questions.length) return {}
        const structure = {}
        const seen = new Set()
        allData.questions.forEach(q => {
          if (!q.category || !q.subcategory || !q.topic_id) return
          if (!structure[q.category]) structure[q.category] = { subcategories: {} }
          if (!structure[q.category].subcategories[q.subcategory])
            structure[q.category].subcategories[q.subcategory] = []
          const key = `${q.category}|${q.subcategory}|${q.topic_id}`
          if (!seen.has(key)) {
            seen.add(key)
            structure[q.category].subcategories[q.subcategory].push({ id: q.topic_id, title: q.title })
          }
        })
        return structure
      }, [allData.questions])

      const currentSteps = useMemo(() => {
        if (!selectedTopic || !Array.isArray(allData.questions)) return []
        return allData.questions.filter(q => q.topic_id === selectedTopic)
      }, [allData, selectedTopic])

      const currentTexts = useMemo(() => {
        if (!selectedTopic || !allData.texts) return []
        return allData.texts[selectedTopic] || []
      }, [allData, selectedTopic])

      const step = currentSteps[currentStep] || null

      const safeOptions = useMemo(() => {
        if (!step || !step.options) return []
        if (Array.isArray(step.options)) return step.options
        if (typeof step.options === 'string') return step.options.split('|').map(s => s.trim())
        return [step.options.toString()]
      }, [step])

      const displayedTexts = useMemo(() => {
        if (step?.step_type !== 'text-selection') return currentTexts
        if (safeOptions.length === 1 && typeof safeOptions[0] === 'string' && safeOptions[0].includes('-')) {
          const bounds = safeOptions[0].replace(/'/g, '').split('-')
          const start = parseInt(bounds[0], 10)
          const end = parseInt(bounds[1], 10)
          return currentTexts.filter(t => parseInt(t.id, 10) >= start && parseInt(t.id, 10) <= end)
        }
        return currentTexts
      }, [currentTexts, step, safeOptions])

      const selectedAnswer = selectedAnswers[currentStep]
      const showExplanation = showExplanationMap[currentStep] || false
      const wrongAnswers = wrongAnswersMap[currentStep] || []
      const showErrorMsg = showErrorMsgMap[currentStep] || false

      const handleLoginSubmit = (e) => {
        e.preventDefault()
        if (passwordInput === sitePassword) {
          setIsAuthenticated(true)
          localStorage.setItem('bagrut_site_password', sitePassword)
          setPasswordError(false)
        } else {
          setPasswordError(true)
        }
      }

      const handleAnswerSelect = (index) => {
        if (showExplanation) return
        
        if (step.require_multiple) {
          setShowErrorMsgMap(prev => ({ ...prev, [currentStep]: false }))
          let current = Array.isArray(selectedAnswer) ? selectedAnswer : []
          let next = current.includes(index) ? current.filter(i => i !== index) : [...current, index]
          setSelectedAnswers(prev => ({ ...prev, [currentStep]: next }))
          
          const correctOnes = Array.isArray(step.correct_answer) ? step.correct_answer.map(String) : [String(step.correct_answer)]
          const nextStrings = next.map(String)
          
         if (next.length === correctOnes.length) {
  if (nextStrings.every(val => correctOnes.includes(val))) {
    setShowExplanationMap(prev => ({ ...prev, [currentStep]: true }))
  } else {
    const wrongOnes = next.filter(val => !correctOnes.includes(String(val)))
    const rightOnes = next.filter(val => correctOnes.includes(String(val)))
    setWrongAnswersMap(prev => ({
      ...prev,
      [currentStep]: [...(prev[currentStep] || []), ...wrongOnes]
    }))
    // שמור רק את הנכונים בסלקשן — אם שניהם שגויים זה מאפס הכל
    setSelectedAnswers(prev => ({ ...prev, [currentStep]: rightOnes }))
    setShowErrorMsgMap(prev => ({ ...prev, [currentStep]: true }))
  }
}
        } else {
          const isCorrect = String(index) === String(step.correct_answer)
          
          if (isCorrect) {
            setSelectedAnswers(prev => ({ ...prev, [currentStep]: index }))
            setShowExplanationMap(prev => ({ ...prev, [currentStep]: true }))
          } else {
            setWrongAnswersMap(prev => ({ ...prev, [currentStep]: [...(prev[currentStep] || []), index] }))
          }
        }
      }

      const handleGradeEssay = async () => {
        if (!userEssay.trim()) return
        setIsGrading(true)
        
        let prompt = `השאלה ${step.content}\nתשובת התלמיד ${userEssay}`
        
        if (step.reference_answer) {
          prompt += `\n\nשים לב מדובר בשאלה עם מחוון ספציפי למורה עליך לתת את הציון אך ורק על סמך אזכור הנקודות הבאות מתוך המחוון \n${step.reference_answer}`
        }

        try {
          const res = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ 
              action: 'grade_essay', 
              prompt: prompt,
              password: sitePassword
            })
          })
          const result = await res.json()
          setAiFeedback(result.feedback)
          const match = result.feedback.match(/ציון[:\s]*(\d+)/)
          if (match) setAiScore(parseInt(match[1], 10))
        } catch (e) {
          setAiFeedback("שגיאה בתקשורת עם השרת")
        }
        setIsGrading(false)
      }

      const handleTryAgain = () => {
        setUserEssay('')
        setAiFeedback('')
        setAiScore(null)
      }

      const handleSubmitGrade = async () => {
        if (!studentName.trim()) return
        setIsSubmittingGrade(true)
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              topic_id: selectedTopic,
              studentName: studentName,
              studentClass: studentClass,
              score: aiScore,
              essay: userEssay,
              feedback: aiFeedback,
              password: sitePassword
            })
          })
          setIsSubmitted(true)
          setTimeout(() => {
            setSelectedTopic(null)
            setCurrentStep(0)
            setSelectedAnswers({})
            setShowExplanationMap({})
            setWrongAnswersMap({})      // תיקון באג: חסר באיפוס
            setShowErrorMsgMap({})     // תיקון באג: חסר באיפוס
            setUserEssay('')
            setAiFeedback('')
            setAiScore(null)
            setIsSubmitted(false)
            setIsSubmittingGrade(false)
          }, 3000)
        } catch (e) {
          console.error(e)
          setIsSubmittingGrade(false)
        }
      }

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4">
            <Loader2 className="w-12 h-12 text-blue-600 animate-spin mb-4" />
            <p className="text-xl font-bold text-slate-700">טוען נתונים מהמערכת</p>
          </div>
        )
      }

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 animate-fadeIn text-right" dir="rtl">
            <div className="bg-white p-8 rounded-3xl shadow-lg max-w-md w-full border border-slate-100">
              <div className="text-center mb-6">
                <div className="inline-block p-4 bg-blue-100 rounded-full mb-4">
                  <Lock className="w-8 h-8 text-blue-600" />
                </div>
                <h1 className="text-2xl font-bold text-slate-800">כניסה למערכת התרגול</h1>
                <p className="text-slate-500 mt-2">הקלידו את הסיסמה שקיבלתם מהמורה</p>
              </div>
              <form onSubmit={handleLoginSubmit} className="space-y-4">
                <input 
                  type="password" 
                  value={passwordInput}
                  onChange={(e) => setPasswordInput(e.target.value)}
                  placeholder="סיסמת גישה"
                  className="w-full p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg font-sans"
                />
                {passwordError && <p className="text-red-500 text-sm text-center font-bold">הסיסמה שגויה נסו שוב</p>}
                <button 
                  type="submit"
                  className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-md"
                >
                  היכנסו לדשבורד
                </button>
              </form>
            </div>
          </div>
        )
      }

      if (!selectedCategory) {
        return (
          <div className="min-h-screen p-4 md:p-8 animate-fadeIn text-right" dir="rtl">
            <div className="max-w-4xl mx-auto">
              <header className="mb-10 text-center">
                <div className="inline-block p-3 bg-blue-100 rounded-2xl mb-4 shadow-sm">
                  <LayoutDashboard className="w-8 h-8 text-blue-600" />
                </div>
                <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-2 drop-shadow-sm">דשבורד הכנה לבגרות</h1>
                <p className="text-slate-800 font-medium bg-white/50 inline-block px-4 py-1 rounded-full">בחרו קטגוריה כדי להתחיל</p>
              </header>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {Object.keys(dashboardStructure).map(cat => (
                  <button key={cat} onClick={() => setSelectedCategory(cat)} className="bg-white/90 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 hover:shadow-md transition-all text-right group flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="bg-blue-100 p-3 rounded-xl text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <BookOpen className="w-6 h-6" />
                      </div>
                      <h3 className="text-2xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors">{cat}</h3>
                    </div>
                    <ChevronLeft className="text-slate-300 group-hover:text-blue-500 transition-transform group-hover:-translate-x-1" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        )
      }

      if (!selectedSubcategory) {
        return (
          <div className="min-h-screen p-4 md:p-8 animate-fadeIn text-right" dir="rtl">
            <div className="max-w-4xl mx-auto">
              <button onClick={() => setSelectedCategory(null)} className="bg-white/80 backdrop-blur-sm text-slate-700 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold py-2 px-4 rounded-xl transition-colors inline-flex">
                <ArrowRight className="w-5 h-5" /> חזרה לקטגוריות
              </button>
              <h2 className="text-2xl font-bold text-slate-800 mb-6 drop-shadow-sm">{selectedCategory} רשימת נושאים</h2>
              <div className="grid grid-cols-1 gap-4">
                {Object.keys(dashboardStructure[selectedCategory]?.subcategories || {}).map(sub => (
                  <button key={sub} onClick={() => setSelectedSubcategory(sub)} className="bg-white/90 backdrop-blur-sm p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 transition-all text-right group flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="bg-slate-100 p-2 rounded-lg text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors"><Folder className="w-5 h-5" /></div>
                      <span className="text-lg font-bold text-slate-700 group-hover:text-blue-700 transition-colors">{sub}</span>
                    </div>
                    <ChevronLeft className="text-slate-300 group-hover:text-blue-500 transition-transform group-hover:-translate-x-1" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        )
      }

      if (!selectedTopic) {
        const questionsList = dashboardStructure[selectedCategory]?.subcategories?.[selectedSubcategory] || []
        return (
          <div className="min-h-screen p-4 md:p-8 animate-fadeIn text-right" dir="rtl">
            <div className="max-w-4xl mx-auto">
              <button onClick={() => setSelectedSubcategory(null)} className="bg-white/80 backdrop-blur-sm text-slate-700 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold py-2 px-4 rounded-xl transition-colors inline-flex">
                <ArrowRight className="w-5 h-5" /> חזרה לרשימת הנושאים
              </button>
              <h2 className="text-2xl font-bold text-slate-800 mb-6 drop-shadow-sm">{selectedSubcategory}</h2>
              <div className="grid grid-cols-1 gap-4">
                {questionsList.map(q => (
                  <button key={q.id} onClick={() => setSelectedTopic(q.id)} className="bg-white/90 backdrop-blur-sm p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-500 transition-all text-right group flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="bg-indigo-50 p-2 rounded-lg text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-colors"><Bookmark className="w-5 h-5" /></div>
                      <span className="text-lg font-bold text-slate-700 group-hover:text-indigo-700 transition-colors">{q.title}</span>
                    </div>
                    <ChevronLeft className="text-slate-300 group-hover:text-indigo-500" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        )
      }

      if (selectedTopic && currentSteps.length === 0) {
        return (
          <div className="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center text-right" dir="rtl">
            <div className="bg-white p-8 rounded-3xl shadow-lg border border-red-200 max-w-lg w-full text-center">
              <XCircle className="w-16 h-16 text-red-500 mx-auto mb-4" />
              <h2 className="text-2xl font-bold text-slate-800 mb-2">אין שאלות לנושא זה</h2>
              <p className="text-slate-600 mb-6">נראה שאין עדיין שאלות בגיליון עבור מזהה הנושא שבחרת או שיש שגיאת כתיב קטנה בגיליון.</p>
              <button onClick={() => setSelectedTopic(null)} className="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 transition-colors">חזרה לדשבורד</button>
            </div>
          </div>
        )
      }

      return (
        <div className="min-h-screen py-4 px-2 sm:px-4 animate-fadeIn text-right" dir="rtl">
          <div className="max-w-3xl mx-auto bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-slate-100 relative">
            <div className="bg-blue-600 text-white p-4 md:p-6 flex items-center justify-between">
              {/* תיקון באג: כפתור חזור עכשיו מאפס את כל ה-state */}
              <button onClick={() => {
                setSelectedTopic(null)
                setCurrentStep(0)
                setSelectedAnswers({})
                setShowExplanationMap({})
                setWrongAnswersMap({})
                setShowErrorMsgMap({})
              }} className="p-2 hover:bg-blue-700 rounded-lg transition-colors"><ArrowRight className="w-6 h-6" /></button>
              <div className="text-center"><h1 className="text-lg md:text-xl font-bold">{step?.title}</h1><p className="text-blue-100 text-xs">{step?.subtitle}</p></div>
              <div className="bg-blue-700 px-3 py-1 rounded-lg text-xs font-bold">{currentStep + 1} / {currentSteps.length}</div>
            </div>
            <div className="p-4 md:p-8">
              {step?.step_type === 'intro' && (
                <div className="space-y-6 animate-fadeIn">
                  <div className="bg-blue-50 p-5 rounded-2xl text-blue-900 leading-relaxed font-medium">{step.content}</div>
                  <div className="bg-[#fdfbf7] p-6 rounded-2xl border border-amber-200 shadow-inner max-h-96 overflow-y-auto">
                    <div className="whitespace-pre-line leading-loose text-lg text-slate-800">{currentTexts.map(t => <span key={t.id}>{t.text} </span>)}</div>
                  </div>
                </div>
              )}
              {step?.step_type === 'text-selection' && (
                <div className="space-y-6 animate-fadeIn">
                  <h2 className="text-xl font-bold text-center text-slate-800">{step.content}</h2>
                  <div className="bg-[#fdfbf7] p-6 rounded-2xl border border-amber-200 shadow-inner max-h-96 overflow-y-auto">
                    <div className="whitespace-pre-line leading-loose text-lg">
                      {displayedTexts.map(t => {
                        const correctOnes = Array.isArray(step.correct_answer) ? step.correct_answer.map(String) : [String(step.correct_answer)]
                        const isCorrectSegment = correctOnes.includes(String(t.id))
                        const isWrong = wrongAnswers.includes(parseInt(t.id))
                        const isSelected = Array.isArray(selectedAnswer) ? selectedAnswer.includes(parseInt(t.id)) : String(selectedAnswer) === String(t.id)
                        
                        let spanClass = "cursor-pointer transition-colors px-1 rounded mx-0.5 "
                        
                        if (showExplanation) {
                          spanClass += isCorrectSegment ? "bg-green-300 font-bold" : (isWrong ? "bg-red-200 line-through text-red-500 opacity-60" : "text-slate-400")
                        } else {
                          if (isSelected) {
                            spanClass += showErrorMsg ? (isCorrectSegment ? "bg-green-200" : "bg-red-200 line-through") : "bg-blue-200"
                          } else if (isWrong) {
                            spanClass += "bg-red-200 line-through text-red-600"
                          } else {
                            spanClass += "hover:bg-amber-100"
                          }
                        }
                        
                        return <span key={t.id} onClick={() => handleAnswerSelect(parseInt(t.id))} className={spanClass}>{t.text} </span>
                      })}
                    </div>
                  </div>
                  {showExplanation && <div className="bg-green-100 p-5 rounded-2xl text-green-900 flex gap-3"><CheckCircle className="shrink-0" /><p>{step.explanation}</p></div>}
                </div>
              )}
              {step?.step_type === 'question' && (
                <div className="space-y-4 animate-fadeIn">
                  <h2 className="text-xl font-bold text-slate-800 mb-6">{step.content}</h2>
                  {safeOptions.map((opt, idx) => {
                    const isCorrect = String(idx) === String(step.correct_answer)
                    const isWrong = wrongAnswers.includes(idx)
                    
                    let btnClass = "w-full text-right p-4 rounded-2xl border-2 transition-all "
                    if (showExplanation && isCorrect) {
                      btnClass += "border-green-500 bg-green-50 text-green-900 font-bold"
                    } else if (isWrong) {
                      btnClass += "border-red-300 bg-red-50 text-red-500 line-through opacity-70"
                    } else {
                      btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700"
                    }
                    
                    return <button key={idx} onClick={() => handleAnswerSelect(idx)} disabled={showExplanation} className={btnClass}>{opt}</button>
                  })}
                  {showExplanation && <div className="bg-green-100 p-5 rounded-2xl text-green-900 flex gap-3"><CheckCircle className="shrink-0" /><p>{step.explanation}</p></div>}
                </div>
              )}
              {step?.step_type === 'ai-practice' && (
                <div className="space-y-6 animate-fadeIn">
                  {currentTexts.length > 0 && (
                    <div className="bg-[#fdfbf7] p-5 rounded-2xl border border-amber-200 shadow-inner max-h-48 overflow-y-auto mb-4">
                      <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2 text-sm"><FileText className="w-4 h-4" /> קטע המקור לתרגול</h3>
                      <div className="whitespace-pre-line leading-relaxed text-slate-800 text-sm">{currentTexts.map(t => <span key={t.id}>{t.text} </span>)}</div>
                    </div>
                  )}
                  {step.image_url && (
                    <div className="w-full text-center my-4 animate-fadeIn">
                      <img src={step.image_url} alt="מקור חזותי לניתוח" className="w-full max-w-lg mx-auto rounded-3xl shadow-xl border-4 border-slate-100 hover:scale-[1.02] transition-transform duration-300" />
                      <p className="text-xs text-slate-400 mt-2">התמונה מתוך השאלה</p>
                    </div>
                  )}
                  
                  {!aiFeedback && (
                    <div className="bg-indigo-50 p-6 rounded-3xl border-2 border-indigo-100">
                      <p className="text-lg text-slate-800 font-medium leading-relaxed whitespace-pre-line">{step.content}</p>
                      <textarea value={userEssay} onChange={(e) => setUserEssay(e.target.value)} className="w-full h-44 p-5 mt-5 rounded-2xl border-none shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700" placeholder="כתבו כאן את התשובה המפורטת שלכם" />
                      <button onClick={handleGradeEssay} disabled={isGrading || !userEssay.trim()} className="w-full mt-5 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-3">{isGrading ? <Loader2 className="animate-spin" /> : <Sparkles />}{isGrading ? 'המורה בודק' : 'שלח לבדיקת בינה מלאכותית'}</button>
                    </div>
                  )}

                  {aiFeedback && (
                    <div className={`bg-white p-6 rounded-3xl border-2 shadow-sm animate-fadeIn ${aiScore !== null && aiScore >= 80 ? 'border-green-300' : 'border-amber-300'}`}>
                      <h3 className="text-xl font-bold mb-4 text-slate-800 flex items-center gap-2"><MessageSquare className="text-blue-500" /> משוב המורה:</h3>
                      <p className="whitespace-pre-line text-slate-700 text-lg leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">{aiFeedback}</p>
                      
                      {aiScore !== null && aiScore >= 80 && !isSubmitted && (
                        <div className="mt-6 bg-green-50 p-5 rounded-2xl border border-green-200">
                          <h4 className="font-bold text-green-900 mb-3">ציון מעולה הכניסו פרטים לשמירה</h4>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                            <input type="text" placeholder="שם מלא" value={studentName} onChange={e => setStudentName(e.target.value)} className="p-3 rounded-xl border border-green-300" />
                            <input type="text" placeholder="כיתה" value={studentClass} onChange={e => setStudentClass(e.target.value)} className="p-3 rounded-xl border border-green-300" />
                          </div>
                          <button onClick={handleSubmitGrade} disabled={!studentName.trim() || isSubmittingGrade} className="w-full bg-green-600 text-white font-bold py-3 rounded-xl">{isSubmittingGrade ? 'שומר' : 'שלח ציון למורה'}</button>
                        </div>
                      )}

                      {/* תיקון באג: הוסף בדיקה שaiScore !== null לפני ההשוואה */}
                      {aiScore !== null && aiScore < 80 && !isSubmitted && (
                        <div className="mt-6 text-center">
                          <p className="text-amber-700 font-bold mb-3">קראו את המשוב ונסו לשפר את התשובה</p>
                          <button onClick={handleTryAgain} className="bg-amber-500 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-amber-600 transition-all flex items-center justify-center gap-2 mx-auto">
                            <RotateCcw className="w-5 h-5" /> נסו לכתוב מחדש
                          </button>
                        </div>
                      )}

                      {isSubmitted && <div className="mt-6 bg-blue-50 p-5 rounded-2xl text-blue-900 font-bold text-center"><CheckCircle className="w-10 h-10 mx-auto text-blue-500 mb-2" />הציון נשמר בהצלחה חוזר לדשבורד</div>}
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className="bg-slate-50 p-5 border-t flex items-center justify-between">
              <button onClick={() => setCurrentStep(prev => prev - 1)} disabled={currentStep === 0} className="flex items-center gap-2 px-4 py-2 text-slate-500 font-bold disabled:opacity-20 transition-opacity"><ArrowRight className="w-5 h-5" /> חזור</button>
              {currentStep < currentSteps.length - 1 && <button onClick={() => setCurrentStep(prev => prev + 1)} className="bg-blue-600 text-white font-bold px-10 py-3 rounded-2xl hover:bg-blue-700 transition-all">המשך</button>}
            </div>
          </div>
        </div>
      )
    }

    const root = createRoot(document.getElementById('root'))
    root.render(<BagrutLomda />)
  </script>
</body>
</html>
